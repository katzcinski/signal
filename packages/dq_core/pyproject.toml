[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "dq_core"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "pyyaml>=6.0",
]

[project.optional-dependencies]
hana = ["hdbcli>=2.19"]
lineage = ["sqlglot>=23.0"]

[tool.setuptools.packages.find]
where = ["."]
include = ["dq_core*"]
