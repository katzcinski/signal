name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  backend:
    name: Backend — tests + gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }  # G3 braucht die Merge-Base zu origin/<base>
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install dependencies
        run: |
          pip install fastapi pydantic pydantic-settings uvicorn pyyaml httpx pytest pytest-cov "python-jose[cryptography]" gitpython jsonschema respx hdbcli
          pip install -e packages/dq_core

      - name: G5 — Engine regression (unit tests)
        run: python -m pytest tests/unit/ -v --tb=short

      - name: G1/G2/G3 — API gate tests
        run: python -m pytest tests/api/ -v --tb=short

      - name: G1 — Contract files validate (jsonschema + lint)
        run: |
          python - <<'EOF'
          import sys, pathlib, yaml
          sys.path.insert(0, 'packages')
          from dq_core.contract.validator import validate_contract
          failed = False
          for path in sorted(pathlib.Path('contracts').glob('*.y*ml')):
            if path.name.endswith('.active.yml'):
              continue
            errors = validate_contract(yaml.safe_load(path.read_text()))
            if errors:
              failed = True
              print(f"G1 FAIL — {path}:")
              for e in errors:
                print(f"  {e}")
          if failed:
            sys.exit(1)
          print("G1 OK — all contract files validate")
          EOF

      - name: G3 — Breaking contract change requires major bump (PRs)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags origin ${{ github.base_ref }}
          python - <<'EOF'
          import subprocess, sys, pathlib, tempfile
          sys.path.insert(0, 'packages')
          from dq_core.contract.gate_g3 import evaluate_paths

          base = "origin/${{ github.base_ref }}"
          # Drei-Punkte (Merge-Base) bevorzugt; Fallback Zwei-Punkte, falls die
          # Historie wider Erwarten flach ist.
          diff = subprocess.run(
            ["git", "diff", "--name-only", f"{base}...HEAD", "--", "contracts/"],
            capture_output=True, text=True,
          )
          if diff.returncode != 0:
            diff = subprocess.run(
              ["git", "diff", "--name-only", base, "HEAD", "--", "contracts/"],
              capture_output=True, text=True, check=True,
            )
          changed = diff.stdout.split()
          failed = False
          for name in changed:
            path = pathlib.Path(name)
            if not path.exists() or path.name.endswith('.active.yml'):
              continue
            show = subprocess.run(["git", "show", f"{base}:{name}"], capture_output=True, text=True)
            if show.returncode != 0:
              continue  # neue Datei — kein Diff-Baseline
            with tempfile.NamedTemporaryFile("w", encoding="utf-8", suffix=".yaml", delete=False) as old_file:
              old_file.write(show.stdout)
              old_path = old_file.name
            result = evaluate_paths(old_path, path)
            if result.blocking:
              failed = True
              print(f"G3 FAIL — {name}: breaking change without major bump "
                    f"({result.from_version} → {result.to_version})")
              for e in result.entries:
                if e.breaking:
                  print(f"  {e.kind}: {e.path} {e.old_value!r} → {e.new_value!r}")
          if failed:
            sys.exit(1)
          print("G3 OK — no breaking contract change without major bump")
          EOF

      - name: G7 — dq_core must not import FastAPI/Flask/Starlette
        run: |
          python - <<'EOF'
          import ast, sys, pathlib
          engine_dir = pathlib.Path('packages/dq_core')
          bad_modules = {'fastapi', 'flask', 'starlette'}
          violations = []
          for py in engine_dir.rglob('*.py'):
            try:
              tree = ast.parse(py.read_text())
            except SyntaxError:
              continue
            for node in ast.walk(tree):
              if isinstance(node, (ast.Import, ast.ImportFrom)):
                mod = ''
                if isinstance(node, ast.Import):
                  mod = node.names[0].name if node.names else ''
                else:
                  mod = node.module or ''
                root = mod.split('.')[0]
                if root in bad_modules:
                  violations.append(f"{py}:{node.lineno}: imports {root}")
          if violations:
            print('\n'.join(violations))
            sys.exit(1)
          print("G7 OK — no framework imports in dq_core")
          EOF

      - name: G2 — No hardcoded CENTRAL schema
        run: |
          python - <<'EOF'
          import pathlib, sys
          hits = []
          for py in pathlib.Path('packages').rglob('*.py'):
            for i, line in enumerate(py.read_text().splitlines(), 1):
              if 'CENTRAL' in line and 'VALID_OWNERS' not in line and '#' not in line.lstrip()[:1]:
                hits.append(f"{py}:{i}: {line.strip()}")
          for py in pathlib.Path('services').rglob('*.py'):
            for i, line in enumerate(py.read_text().splitlines(), 1):
              if '"CENTRAL"' in line or "'CENTRAL'" in line:
                hits.append(f"{py}:{i}: {line.strip()}")
          if hits:
            print("G2 FAIL — hardcoded CENTRAL schema:")
            print('\n'.join(hits))
            sys.exit(1)
          print("G2 OK")
          EOF

      - name: G6 — skipped_stale state is never silently omitted
        run: |
          python - <<'EOF'
          import sys, pathlib
          # Verify every valid gating state constant is explicitly defined in models.py
          models = pathlib.Path('packages/dq_core/engine/models.py').read_text()
          required = ['skipped_stale', 'skipped_dependency', 'downgraded', 'executed', 'error']
          missing = [s for s in required if s not in models]
          if missing:
            print(f"G6 FAIL — states missing from models.py: {missing}")
            sys.exit(1)
          # Verify store persists the state column (not silently dropped)
          store_src = pathlib.Path('packages/dq_core/store/sqlite_store.py').read_text()
          if 'result.state' not in store_src:
            print("G6 FAIL — store does not persist result.state")
            sys.exit(1)
          print("G6 OK — gating states defined and persisted")
          EOF

      - name: G8 — PII gate enforced in store
        run: |
          python - <<'EOF'
          import sys, pathlib
          store_src = pathlib.Path('packages/dq_core/store/sqlite_store.py').read_text()
          # The flag must gate diagnostic insertion
          if '_allow_diagnostics' not in store_src:
            print("G8 FAIL — _allow_diagnostics not in store")
            sys.exit(1)
          if 'allow_diagnostics' not in store_src:
            print("G8 FAIL — allow_diagnostics param not in store __init__")
            sys.exit(1)
          print("G8 OK — PII gate present in store")
          EOF

      - name: Coverage report
        run: python -m pytest tests/ --cov=packages --cov=services --cov-report=term-missing -q

  odcs-second-opinion:
    # R5-2: datacontract-cli als Zweitmeinung zum homegrown Breaking-Diff (O1).
    # Bewusst non-blocking: Diskrepanzen sind ein Report, kein Merge-Stopper.
    name: ODCS — datacontract-cli breaking check (advisory)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Export ODCS for base and head, run datacontract breaking
        continue-on-error: true
        run: |
          pip install pyyaml jsonschema "datacontract-cli" 2>/dev/null || pip install pyyaml jsonschema
          pip install -e packages/dq_core
          mkdir -p /tmp/odcs/base /tmp/odcs/head
          python - <<'EOF'
          import pathlib, sys, yaml, subprocess
          sys.path.insert(0, 'packages')
          from dq_core.contract.odcs_export import to_odcs
          base_ref = "origin/${{ github.base_ref }}"
          diff = subprocess.run(
              ["git", "diff", "--name-only", f"{base_ref}...HEAD", "--", "contracts/"],
              capture_output=True, text=True,
          )
          if diff.returncode != 0:
              diff = subprocess.run(
                  ["git", "diff", "--name-only", base_ref, "HEAD", "--", "contracts/"],
                  capture_output=True, text=True, check=True,
              )
          for name in diff.stdout.split():
              path = pathlib.Path(name)
              if not path.exists() or path.name.endswith('.active.yml'):
                  continue
              head_contract = yaml.safe_load(path.read_text()) or {}
              if head_contract.get("kind", "internal_gate") == "internal_gate":
                  print(f"ODCS SKIP - {path}: internal_gate has no ODCS export")
                  continue
              head = to_odcs(head_contract)
              pathlib.Path(f"/tmp/odcs/head/{path.stem}.odcs.yaml").write_text(yaml.safe_dump(head))
              show = subprocess.run(["git", "show", f"{base_ref}:{path}"], capture_output=True, text=True)
              if show.returncode == 0:
                  base_contract = yaml.safe_load(show.stdout) or {}
                  if base_contract.get("kind", "internal_gate") == "internal_gate":
                      continue
                  base = to_odcs(base_contract)
                  pathlib.Path(f"/tmp/odcs/base/{path.stem}.odcs.yaml").write_text(yaml.safe_dump(base))
          EOF
          for f in /tmp/odcs/head/*.odcs.yaml; do
            name=$(basename "$f")
            if [ -f "/tmp/odcs/base/$name" ] && command -v datacontract >/dev/null; then
              echo "=== datacontract breaking: $name ==="
              datacontract breaking "/tmp/odcs/base/$name" "$f" || true
            fi
          done

  frontend:
    name: Frontend — typecheck + lint + G4 drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install deps
        working-directory: apps/cockpit
        run: npm ci --prefer-offline || npm install

      - name: G4 — OpenAPI → TS types, no drift
        # Advisory on this branch (per request): the batch added backend
        # endpoints without regenerating openapi.json / schema.d.ts, and the FE
        # uses hand-written types in src/types. The drift is still reported, but
        # does not block the PR. typecheck / lint / tests / build remain gating.
        continue-on-error: true
        run: |
          pip install fastapi pydantic pydantic-settings pyyaml jsonschema httpx
          pip install -e packages/dq_core
          python scripts/export_openapi.py
          # Subshell: das cd darf nicht in den git-diff-Schritt lecken
          (cd apps/cockpit && npm run gen:api)
          # add -N: auch UNGETRACKTE Artefakte zählen als Drift, nicht als Pass
          git add -N apps/cockpit/openapi.json apps/cockpit/src/api/schema.d.ts
          git diff --exit-code -- apps/cockpit/openapi.json apps/cockpit/src/api/schema.d.ts

      - name: TypeScript type-check
        working-directory: apps/cockpit
        # Use the locked compiler from node_modules (npm run → PATH), never
        # `npx tsc` which fetches the latest major from the registry and fails
        # on options the pinned TypeScript still accepts.
        run: npm run typecheck

      - name: ESLint (S8 — no-danger, rules-of-hooks)
        working-directory: apps/cockpit
        run: npm run lint

      - name: Unit tests (vitest)
        working-directory: apps/cockpit
        run: npm run test -- --run

      - name: Build
        working-directory: apps/cockpit
        run: npm run build
